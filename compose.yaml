# podman-compose up -d   (docker compose works identically)
#
# Mounts ./grib-viewer.yaml (sources config) and ./data (the GRIB buffer)
# into the container's workdir, so the config's relative `data_dir:
# ./data` lands on the host folder. UI + API on http://localhost:8080.
services:
  grib-viewer:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}  # git describe, set by `make compose-up`
    image: grib-viewer:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./grib-viewer.yaml:/app/grib-viewer.yaml:ro
    restart: unless-stopped
